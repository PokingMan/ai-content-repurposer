<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RepurposeAI - One Paste Magic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: system-ui; }</style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <div class="text-center mb-8">
      <h1 class="text-5xl font-bold mb-2">RepurposeAI</h1>
      <p class="text-xl text-gray-400">Paste once. Get 10 formats. Save hours every week.</p>
    </div>

    <div class="bg-gray-900 p-6 rounded-3xl mb-8">
      <textarea id="inputText" rows="5" class="w-full bg-gray-800 text-white p-5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-green-500 text-base"
        placeholder="Paste your blog post, video script, podcast notes, or any content here..."></textarea>
      
      <button onclick="repurposeContent()" 
        class="mt-6 w-full bg-green-600 hover:bg-green-500 py-5 rounded-2xl font-semibold text-lg flex items-center justify-center gap-2">
        ✨ Repurpose My Content
      </button>
    </div>

    <div id="results" class="hidden"></div>

    <div class="mt-12 text-center">
      <a href="https://github.com/pokingman/ai-content-repurposer" target="_blank"
         class="inline-block bg-purple-600 hover:bg-purple-500 px-10 py-4 rounded-3xl font-bold text-lg mb-4">
        ⭐ Star on GitHub
      </a>
      
      <a href="https://github.com/sponsors/pokingman" target="_blank"
         class="block mt-3 text-green-400 hover:text-green-300 text-sm">
        ❤️ Sponsor this project (priority features + early cloud access)
      </a>
    </div>

    <div class="text-center mt-10 text-gray-500 text-xs">
      Free GitHub version • Cloud version (unlimited + faster AI) coming soon
    </div>
  </div>

  <script>
    function repurposeContent() {
      const input = document.getElementById('inputText').value.trim();
      const resultsDiv = document.getElementById('results');
      
      if (!input) {
        alert("Please paste some content first!");
        return;
      }

      resultsDiv.innerHTML = `
        <div class="bg-green-900/30 border border-green-500 p-5 rounded-3xl mb-8 text-center">
          <p class="text-green-400 font-medium">✅ Repurposed successfully! (Demo mode)</p>
        </div>
      `;

      const formats = [
        {emoji: "🐦", title: "Twitter Thread", content: "1/ Hook: " + input.substring(0, 90) + "...\n\n2/ The big insight I discovered...\n\n3/ Why this matters right now...\n\n4/ My personal takeaway...\n\nWhat do you think? 👇"},
        {emoji: "💼", title: "LinkedIn Post", content: "Just published: " + input.substring(0, 120) + "...\n\nThis completely changed how I approach content creation. The results speak for themselves.\n\nFull breakdown in the thread below 👇"},
        {emoji: "📧", title: "Email Newsletter", content: "Subject: This week's big insight\n\nHey friends,\n\n" + input.substring(0, 180) + "...\n\nRead time: 4 minutes\n\nWhat did you think?"},
        {emoji: "📸", title: "Instagram Caption", content: input.substring(0, 140) + "... 🔥\n\nThis tool is a game changer for creators.\n\n#ContentCreation #AICreator #RepurposeAI #CreatorLife"},
        {emoji: "🎥", title: "YouTube Script Hook", content: "Video Hook (0:00 - 0:15):\n\"I used to spend 3 hours repurposing one piece of content... until I built this.\"\n\nMain points..."},
      ];

      formats.forEach(format => {
        const card = document.createElement('div');
        card.className = "bg-gray-900 p-6 rounded-3xl mb-6";
        card.innerHTML = `
          <div class="flex items-center gap-3 mb-4">
            <span class="text-2xl">${format.emoji}</span>
            <h3 class="font-semibold text-lg">${format.title}</h3>
          </div>
          <pre class="text-sm text-gray-300 whitespace-pre-wrap leading-relaxed">${format.content}</pre>
          <button onclick="copyToClipboard(this)" class="mt-5 text-sm bg-gray-800 hover:bg-gray-700 px-6 py-3 rounded-2xl">Copy to Clipboard</button>
        `;
        resultsDiv.appendChild(card);
      });

      resultsDiv.classList.remove('hidden');
      resultsDiv.scrollIntoView({ behavior: "smooth" });
    }

    function copyToClipboard(btn) {
      const text = btn.previousElementSibling.textContent;
      navigator.clipboard.writeText(text);
      const original = btn.textContent;
      btn.textContent = "✅ Copied!";
      setTimeout(() => btn.textContent = original, 2000);
    }
  </script>
</body>
</html>
